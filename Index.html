<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:#f0f2f5;min-height:100vh;padding-bottom:80px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e5e5;display:flex;z-index:200}
.nb{flex:1;background:none;border:none;font-family:'Heebo',sans-serif;font-size:0.72rem;font-weight:600;color:#aaa;padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nb .ic{font-size:1.2rem}
.nb.on{color:#25d366}
.pg{display:none;padding:16px 14px;max-width:500px;margin:0 auto}
.pg.on{display:block}
.ph{margin-bottom:16px}
.ph h1{font-size:1.35rem;font-weight:900;color:#111}
.ph p{font-size:0.78rem;color:#999;margin-top:3px}
.card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.cl{font-size:.65rem;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.dps{display:flex;flex-wrap:wrap;gap:6px}
.dp{background:#f7f7f7;border:1.5px solid #eee;border-radius:30px;color:#555;font-family:'Heebo',sans-serif;font-size:.8rem;font-weight:600;padding:6px 13px;cursor:pointer;user-select:none;transition:all .15s}
.dp.sel{background:#eafaf1;border-color:#25d366;color:#1a7a40}
.dp:active{transform:scale(.94)}
.cust{width:100%;background:#f7f7f7;border:1.5px solid #eee;border-radius:10px;color:#111;font-family:'Heebo',sans-serif;font-size:.9rem;padding:9px 13px;outline:none;margin-top:10px;display:none}
.cust.vis{display:block}
.cust:focus{border-color:#25d366}
.sbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 2px}
.sar{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.cb{width:20px;height:20px;border-radius:6px;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:.72rem;flex-shrink:0;transition:all .15s}
.cb.on{background:#25d366;border-color:#25d366;color:#fff}
.cb.pt{background:#eafaf1;border-color:#25d366;color:#25d366}
.cb.ron{background:#f04e4e;border-color:#f04e4e;color:#fff}
.cb.rpt{background:#ffeaea;border-color:#f04e4e;color:#f04e4e}
.sl{font-size:.82rem;font-weight:600;color:#555}
.sc{font-size:.75rem;color:#999}
.row{background:#fff;border-radius:12px;padding:11px 14px;margin-bottom:7px;box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:opacity .15s}
.row.off{opacity:.38}
.rcb{width:22px;height:22px;border-radius:7px;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:.78rem;flex-shrink:0;transition:all .15s}
.row:not(.off) .rcb{background:#25d366;border-color:#25d366;color:#fff}
.row.red:not(.off) .rcb{background:#f04e4e;border-color:#f04e4e}
.ri{flex:1}
.rn{font-size:.92rem;font-weight:700;color:#111}
.rt{font-size:.7rem;color:#25d366;font-weight:600;direction:ltr;display:inline-block}
.nph{font-size:.65rem;color:#f0a500;margin-top:1px}
.ra{font-size:.8rem;font-weight:700;color:#f04e4e;margin-top:2px}
.fab{position:fixed;bottom:66px;left:14px;right:14px;max-width:472px;margin:0 auto;color:#fff;border:none;border-radius:14px;font-family:'Heebo',sans-serif;font-size:.98rem;font-weight:700;padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;z-index:150;transition:all .15s}
.fab.g{background:#25d366;box-shadow:0 4px 14px rgba(37,211,102,.35)}
.fab.r{background:#f04e4e;box-shadow:0 4px 14px rgba(240,78,78,.3)}
.fab:disabled{background:#ccc;box-shadow:none}
.fab:not(:disabled):active{transform:scale(.98);opacity:.9}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center}
.mov.on{display:flex}
.mod{background:#fff;border-radius:20px 20px 0 0;padding:18px 18px 32px;width:100%;max-width:500px}
.mh{width:38px;height:4px;background:#ddd;border-radius:10px;margin:0 auto 14px}
.ms{font-size:.68rem;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.mn{font-size:1.1rem;font-weight:900;color:#111;margin-bottom:10px}
.mm{background:#f0f2f5;border-radius:12px;padding:11px 13px;font-size:.88rem;color:#333;line-height:1.65;margin-bottom:14px}
.mwa{display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;border:none;border-radius:13px;font-family:'Heebo',sans-serif;font-size:.98rem;font-weight:700;padding:13px;width:100%;text-decoration:none;cursor:pointer}
.mwa.g{background:#25d366}
.mwa.r{background:#f04e4e}
.mwa:active{opacity:.9}
.msk{width:100%;background:none;border:1px solid #eee;border-radius:12px;font-family:'Heebo',sans-serif;font-size:.85rem;color:#999;padding:10px;margin-top:8px;cursor:pointer}
.si{width:100%;background:#fff;border:1.5px solid #eee;border-radius:12px;color:#111;font-family:'Heebo',sans-serif;font-size:.9rem;padding:11px 14px;outline:none;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:12px}
.si:focus{border-color:#25d366}
.si::placeholder{color:#ccc}
.mr{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:7px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.mt{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mna{flex:1;font-size:.9rem;font-weight:700;color:#111;min-width:0}
.mb{font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.mb.d{background:#ffeaea;color:#f04e4e}
.mb.ok{background:#eafaf1;color:#25d366}
.mph{font-size:.72rem;color:#25d366;font-weight:600;direction:ltr;white-space:nowrap}
.mph.mis{color:#f0a500}
.eb{background:#f7f7f7;border:1px solid #eee;border-radius:7px;font-family:'Heebo',sans-serif;font-size:.72rem;color:#666;padding:4px 9px;cursor:pointer;white-space:nowrap}
.per{display:flex;gap:6px;margin-top:8px}
.pei{flex:1;background:#f7f7f7;border:1.5px solid #eee;border-radius:8px;color:#111;font-family:'Heebo',sans-serif;font-size:.88rem;padding:8px 10px;outline:none;direction:ltr}
.pei:focus{border-color:#25d366}
.psb{background:#25d366;border:none;border-radius:8px;color:#fff;font-family:'Heebo',sans-serif;font-size:.8rem;font-weight:700;padding:8px 12px;cursor:pointer}
.wi{width:17px;height:17px;fill:white;flex-shrink:0}
.sp{height:64px}
.em{text-align:center;color:#ccc;font-size:.85rem;padding:24px 0}
</style>

const D=C.filter(c=>c.balance<0);
let phones={},remChk={},dbtChk={},editIdx=null,queue=[],qi=0,curDay="מחר";

S.forEach((_,i)=>remChk[i]=true);
D.forEach((_,i)=>dbtChk[i]=true);

function getPh(name){if(phones[name]!==undefined)return phones[name];const c=C.find(x=>x.name===name);return c?c.phone:"";}
function waUrl(ph,msg){const e=encodeURIComponent(msg);return ph?`whatsapp://send?phone=972${ph.replace(/^0/,"")}&text=${e}`:`whatsapp://send?text=${e}`;}
function fmtT(t){const[h,m]=t.split(":").map(Number);const p=h<12?"בבוקר":h<17?'אחה"צ':"בערב";return `${h}:${String(m).padStart(2,"0")} ${p}`;}
function remMsg(name,time,day){return `היי ${name} \uD83D\uDE0A בוקר טוב!\nנתראה ${day} בשעה ${fmtT(time)} \uD83D\uDE4F`;}
function dbtMsg(name,amt){return `היי ${name} \uD83D\uDE0A\nתזכורת קטנה לגבי יתרת חוב של ${Math.abs(amt).toLocaleString()} \u20AA.\n\nניתן לשלם בהעברה בנקאית:\nבנק לאומי 10 | סניף 921\nחשבון 33930078\nתומר רונן פיזיותרפיה בע"מ\n\nאו באשראי \u2014 אשלח קישור בנפרד \uD83D\uDCB3\n\nתודה רבה! \uD83D\uDE4F`;}

function showPg(p){
  document.querySelectorAll(".pg").forEach(x=>x.classList.remove("on"));
  document.querySelectorAll(".nb").forEach(x=>x.classList.remove("on"));
  document.getElementById("pg-"+p).classList.add("on");
  document.getElementById("nb-"+p).classList.add("on");
  if(p==="clt")renderClt();
}

function selDay(el){
  document.querySelectorAll(".dp").forEach(x=>x.classList.remove("sel"));
  el.classList.add("sel");
  const ci=document.getElementById("custDay");
  if(el.dataset.day==="custom"){ci.classList.add("vis");ci.focus();curDay="";}
  else{ci.classList.remove("vis");curDay=el.dataset.day;}
  renderRem();
}
document.getElementById("custDay").addEventListener("input",function(){curDay=this.value.trim();renderRem();});

// ── REMINDERS ──
document.getElementById("remSelAll").addEventListener("click",function(){
  const all=S.every((_,i)=>remChk[i]);
  S.forEach((_,i)=>{remChk[i]=!all;});
  renderRem();
});

function renderRem(){
  const day=curDay||document.getElementById("custDay").value.trim()||"מחר";
  const chk=S.filter((_,i)=>remChk[i]).length,tot=S.length;
  const cb=document.getElementById("remCb");
  cb.className="cb"+(chk===tot?" on":chk>0?" pt":"");cb.textContent=chk===tot?"✓":chk>0?"−":"";
  document.getElementById("remCnt").textContent=`${chk} מתוך ${tot}`;
  document.getElementById("remBtn").disabled=chk===0;
  document.getElementById("remBtnTxt").textContent=chk>0?`שלח ל\u2010${chk} לקוחות`:"בחר לקוחות";
  document.getElementById("remList").innerHTML=S.map((s,i)=>{
    const ok=remChk[i],p=getPh(s.name);
    return `<div class="row ${ok?"":"off"}" data-ri="${i}"><div class="rcb">${ok?"✓":""}</div><div class="ri"><div class="rn">${s.name}</div><div class="rt">${s.time}</div>${!p?'<div class="nph">⚠️ אין מספר</div>':""}</div></div>`;
  }).join("");
  document.querySelectorAll("#remList .row").forEach(el=>{
    el.addEventListener("click",function(){const i=parseInt(this.dataset.ri);remChk[i]=!remChk[i];renderRem();});
  });
}

function startRem(){
  const day=curDay||document.getElementById("custDay").value.trim()||"מחר";
  queue=S.map((s,i)=>({...s,msg:remMsg(s.name,s.time,day),ph:getPh(s.name),mode:"g",skip:!remChk[i]})).filter(x=>!x.skip);
  qi=0;showMod();
}

// ── DEBTS ──
document.getElementById("dbtSelAll").addEventListener("click",function(){
  const all=D.every((_,i)=>dbtChk[i]);
  D.forEach((_,i)=>{dbtChk[i]=!all;});
  renderDbt();
});

function renderDbt(){
  const chk=D.filter((_,i)=>dbtChk[i]).length,tot=D.length;
  const totAmt=D.reduce((a,c)=>a+c.balance,0);
  document.getElementById("dbtSub").textContent=`${tot} לקוחות · סה"כ חוב: ${Math.abs(totAmt).toLocaleString()} ₪`;
  const cb=document.getElementById("dbtCb");
  cb.className="cb"+(chk===tot?" ron":chk>0?" rpt":"");cb.textContent=chk===tot?"✓":chk>0?"−":"";
  document.getElementById("dbtCnt").textContent=`${chk} מתוך ${tot}`;
  document.getElementById("dbtBtn").disabled=chk===0;
  document.getElementById("dbtBtnTxt").textContent=chk>0?`שלח ל\u2010${chk} לקוחות`:"בחר לקוחות";
  document.getElementById("dbtList").innerHTML=D.map((c,i)=>{
    const ok=dbtChk[i];
    return `<div class="row red ${ok?"":"off"}" data-di="${i}"><div class="rcb">${ok?"✓":""}</div><div class="ri"><div class="rn">${c.name}</div><div class="ra">${Math.abs(c.balance).toLocaleString()} ₪</div></div></div>`;
  }).join("");
  document.querySelectorAll("#dbtList .row").forEach(el=>{
    el.addEventListener("click",function(){const i=parseInt(this.dataset.di);dbtChk[i]=!dbtChk[i];renderDbt();});
  });
}

function startDbt(){
  queue=D.map((c,i)=>({name:c.name,msg:dbtMsg(c.name,c.balance),ph:getPh(c.name),mode:"r",skip:!dbtChk[i]})).filter(x=>!x.skip);
  qi=0;showMod();
}

// ── MODAL ──
function showMod(){
  if(qi>=queue.length){closeMod();return;}
  const it=queue[qi],rem=queue.length-qi-1;
  document.getElementById("mStep").textContent=`${qi+1} מתוך ${queue.length}`;
  document.getElementById("mName").textContent=it.name;
  document.getElementById("mMsg").innerHTML=it.msg.replace(/\n/g,"<br>");
  const wa=document.getElementById("mWa");
  wa.href=waUrl(it.ph,it.msg);
  wa.className="mwa "+(it.mode==="r"?"r":"g");
  wa.onclick=function(){qi++;setTimeout(showMod,500);};
  const sk=document.getElementById("mSkip");
  sk.textContent=rem>0?`דלג — הבא › (${rem} נשארו)`:"סיום ✅";
  sk.onclick=function(){qi++;showMod();};
  document.getElementById("mov").classList.add("on");
}
function closeMod(){document.getElementById("mov").classList.remove("on");}
document.getElementById("mov").addEventListener("click",function(e){if(e.target===this)closeMod();});

// ── CLIENTS ──
function renderClt(){
  const q=document.getElementById("srch").value.trim();
  const list=q?C.filter((c,i)=>{C._fi=i;return c.name.includes(q);}):C;
  const indices=q?C.map((c,i)=>c.name.includes(q)?i:-1).filter(i=>i>=0):C.map((_,i)=>i);
  if(!indices.length){document.getElementById("cltList").innerHTML='<div class="em">לא נמצא</div>';return;}
  document.getElementById("cltList").innerHTML=indices.map(i=>{
    const c=C[i],p=getPh(c.name),isE=editIdx===i;
    return `<div class="mr">
      <div class="mt">
        <div class="mna">${c.name}</div>
        ${c.balance<0?`<span class="mb d">${Math.abs(c.balance).toLocaleString()} ₪</span>`:`<span class="mb ok">✓</span>`}
        <div class="mph ${p?"":"mis"}">${p||"אין טלפון"}</div>
        <button class="eb" data-ei="${i}">${isE?"ביטול":p?"ערוך":"+ הוסף"}</button>
      </div>
      ${isE?`<div class="per"><input class="pei" id="pei${i}" type="tel" value="${p}" placeholder="0501234567"><button class="psb" data-si="${i}">שמור</button></div>`:""}
    </div>`;
  }).join("");
  document.querySelectorAll(".eb").forEach(b=>{
    b.addEventListener("click",function(){const i=parseInt(this.dataset.ei);editIdx=editIdx===i?null:i;renderClt();if(editIdx===i)setTimeout(()=>{const el=document.getElementById("pei"+i);if(el){el.focus();el.select();}},50);});
  });
  document.querySelectorAll(".psb").forEach(b=>{
    b.addEventListener("click",function(){const i=parseInt(this.dataset.si);const el=document.getElementById("pei"+i);if(el){phones[C[i].name]=el.value.trim().replace(/\D/g,"");}editIdx=null;renderClt();});
  });
}

// ── INIT ──
const now=new Date();
const days=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
document.getElementById("sd").textContent=`${days[now.getDay()]} ${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`;
renderRem();
renderDbt();
</script>
